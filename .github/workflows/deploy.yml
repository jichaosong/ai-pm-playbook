name: Deploy VitePress to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run docs:build

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "prodthinkpm"
          git config user.email "prodthinkpm@gmail.com"
          cp -r docs/.vitepress/dist /tmp/gh-pages
          git fetch origin gh-pages 2>/dev/null || git checkout --orphan gh-pages-temp
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          rm -rf *
          cp -r /tmp/gh-pages/* .
          git add -A
          git commit -m "deploy: ${{ github.sha }}"
          git push origin gh-pages --force
